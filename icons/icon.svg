<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c9a7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00897b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,80,70,0.35)"/>
    </filter>
  </defs>
  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Brilho sutil no topo -->
  <ellipse cx="256" cy="120" rx="200" ry="80" fill="rgba(255,255,255,0.10)"/>
  <!-- Letra M em bege/creme -->
  <text
    x="256" y="348"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="300"
    font-weight="700"
    fill="#f5f0e8"
    text-anchor="middle"
    letter-spacing="-10"
    style="paint-order:stroke"
    stroke="#e8e0cc"
    stroke-width="4"
  >M</text>
  <!-- Ponto decorativo pequeno abaixo -->
  <circle cx="256" cy="430" r="14" fill="rgba(245,240,232,0.35)"/>
</svg>